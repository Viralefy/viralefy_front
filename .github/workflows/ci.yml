name: CI

# TODO(secrets): defina SENTRY_AUTH_TOKEN nos repo secrets pra ativar o
# upload de sourcemaps. Sem ele, o passo abaixo é skipped (só roda em main).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: https://www.viralefy.com
      NEXT_PUBLIC_API_URL: https://api.viralefy.com
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: npm ci
        run: npm ci --no-audit --no-fund

      - name: tsc --noEmit
        run: npx tsc --noEmit

      - name: unit tests
        run: npm test

      - name: next build
        run: npm run build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: viralefy
          SENTRY_PROJECT_FRONT: viralefy-front

      - name: Upload sourcemaps to Sentry
        if: github.ref == 'refs/heads/main' && env.SENTRY_AUTH_TOKEN != ''
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: viralefy
          SENTRY_PROJECT: viralefy-front
        run: |
          npx @sentry/cli releases new ${{ github.sha }}
          npx @sentry/cli releases files ${{ github.sha }} upload-sourcemaps ./.next
          npx @sentry/cli releases finalize ${{ github.sha }}

  npm-audit:
    runs-on: ubuntu-latest
    # Non-blocking: complementa Renovate vulnerabilityAlerts. Reporta
    # findings high/critical sem quebrar o build; promover pra blocking
    # depois do baseline limpo.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: npm audit (high+)
        run: npm audit --audit-level=high

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
